<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | HandSignify Intro</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/scroll-hero.css') }}">

    <style>
        /* Hidden until JS loads to prevent flicker */
        body {
            background: #0B0B0D;
        }

        .scroll-hero {
            opacity: 0;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>

    <section class="scroll-hero">
        <canvas id="hero-canvas"></canvas>

        <div class="start-container">
            <button id="start-btn">Let's Start</button>
        </div>

        <div class="scroll-indicator">
            <span>Scroll Down</span>
            <div class="mouse">
                <div class="wheel"></div>
            </div>
        </div>
    </section>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/scroll-animation.js') }}"></script>

    <script>
        // Fade in once images start loading
        window.addEventListener('load', () => {
            document.querySelector('.scroll-hero').style.opacity = '1';
        });
    </script>

</body>

</html>
